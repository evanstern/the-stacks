# ci.yml — the authoritative gate suite (constitution Development Workflow:
# CI gates; .githooks/ and the Claude Stop hook are convenience mirrors of
# this). Three jobs:
#
#   verify         pnpm verify (boundaries + gate unit tests + typecheck +
#                  vitest) with the DB-gated integration suites live against a
#                  pgvector service container — the same image compose runs.
#   ml             the Python sidecar's own suite (pytest + pyright); kept out
#                  of pnpm verify by design (007 FR-017).
#   process-gates  the doctrine gates: wiki freshness + spec-bridge via the
#                  official praxis composite action (evanstern/praxis@<tag>,
#                  its versioned consumer contract — docs/consuming-gates.md
#                  in praxis), the per-spec course gate, spec-artifact closure,
#                  ADR format, and (PRs only) the version-bump contract. Pins
#                  are tags; upgrading a pin is a deliberate PR (ADR 0002).
#
# fetch-depth: 0 everywhere history is judged: merge-base for the bump gate,
# tags for "version never reused", and `git log <pin>..HEAD` for wiki
# freshness all need real history. Squash merges are prohibited for the same
# reason (wiki pins must stay reachable).
name: ci

on:
  pull_request:
  push:
    branches: [main]

env:
  # One praxis version for the whole suite. The composite action's uses: line
  # below rides the same tag but cannot read env — bump BOTH together.
  PRAXIS_REF: v0.4.0

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: stacks_v3
          POSTGRES_USER: stacks_v3
          POSTGRES_PASSWORD: stacks_v3
        ports:
          - "5442:5432"
        options: >-
          --health-cmd "pg_isready -U stacks_v3"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      RUN_DB_INTEGRATION_TESTS: "1"
      DATABASE_URL: postgresql://stacks_v3:stacks_v3@localhost:5442/stacks_v3
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify

  ml:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ml
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest
      - run: pyright --project .

  process-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      # The official praxis consumption surface (composite action): GitHub
      # fetches the praxis tree at this tag and runs the selected gates
      # against our workspace. praxis is private — its repo settings must
      # allow Actions access from user-owned repositories
      # (praxis Settings -> Actions -> General -> Access).
      - name: wiki freshness + spec-bridge (praxis gates action)
        uses: evanstern/praxis@v0.4.0
        with:
          gates: spec-bridge, wiki-freshness
      # The action's course gate is single-dir; this repo holds one course PER
      # SPEC plus the legacy baseline (ADR 0002), so check-courses.mjs
      # enumerates docs/courses/*/ against a praxis checkout. GITHUB_TOKEN
      # can't read across repos — this checkout needs PRAXIS_READ_TOKEN
      # (fine-grained read-only PAT). The dot-dir path keeps it out of every
      # scan (spec-bridge's root discovery skips dot-dirs; not released surface).
      - uses: actions/checkout@v5
        with:
          repository: evanstern/praxis
          ref: ${{ env.PRAXIS_REF }}
          path: .praxis
          token: ${{ secrets.PRAXIS_READ_TOKEN }}
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: course gate (Principle VIII chrome contract)
        run: node scripts/check-courses.mjs --praxis .praxis --require-praxis
      - name: spec artifacts (Principle VIII closure)
        run: node scripts/check-spec-artifacts.mjs
      - name: ADR format
        run: node scripts/check-adrs.mjs
      - name: version bump (released surface ⇒ semver increase)
        if: github.event_name == 'pull_request'
        run: node scripts/check-version-bump.mjs --base "origin/${{ github.base_ref }}"
