name: ${COMPOSE_PROJECT_NAME:-the-stacks-v3}

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${V3_POSTGRES_DB:-stacks_v3}
      POSTGRES_USER: ${V3_POSTGRES_USER:-stacks_v3}
      POSTGRES_PASSWORD: ${V3_POSTGRES_PASSWORD:-stacks_v3}
    ports:
      - "127.0.0.1:${V3_POSTGRES_PORT:-5442}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${V3_POSTGRES_USER:-stacks_v3}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://stacks_v3:stacks_v3@postgres:5432/stacks_v3}
      OPERATOR_PASSWORD_HASH: ${OPERATOR_PASSWORD_HASH}
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local-sidecar}
      EMBEDDING_ENDPOINT: ${EMBEDDING_ENDPOINT:-http://ml:4402}
      EMBEDDING_MODEL_ID: ${EMBEDDING_MODEL_ID:-sentence-transformers/all-MiniLM-L6-v2}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-384}
      V3_API_PORT: ${V3_API_PORT:-4401}
    ports:
      - "127.0.0.1:${V3_API_PORT:-4401}:4401"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:4401/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  ml:
    build:
      context: ./apps/ml
    volumes:
      - hf-cache:/hf-cache
    environment:
      ML_EMBEDDING_MODEL: ${ML_EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      EMBED_MAX_BATCH: ${EMBED_MAX_BATCH:-64}
    ports:
      - "127.0.0.1:${V3_ML_PORT:-4402}:4402"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4402/ready').status==200 else 1)",
        ]
      interval: 5s
      timeout: 5s
      retries: 90
      start_period: 60s

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    depends_on:
      api:
        condition: service_healthy
      ml:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://stacks_v3:stacks_v3@postgres:5432/stacks_v3}
      WORKER_POLL_MS: ${WORKER_POLL_MS:-2000}
      WORKER_VISIBILITY_TIMEOUT_MS: ${WORKER_VISIBILITY_TIMEOUT_MS:-60000}
      JOB_MAX_ATTEMPTS: ${JOB_MAX_ATTEMPTS:-3}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local-sidecar}
      EMBEDDING_ENDPOINT: ${EMBEDDING_ENDPOINT:-http://ml:4402}
      EMBEDDING_MODEL_ID: ${EMBEDDING_MODEL_ID:-sentence-transformers/all-MiniLM-L6-v2}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-384}
      ML_REQUEST_TIMEOUT_MS: ${ML_REQUEST_TIMEOUT_MS:-15000}
    healthcheck:
      test: ["CMD-SHELL", "find /tmp/worker-heartbeat -mmin -1 | grep -q ."]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:4401}
      PORT: "4400"
    ports:
      - "127.0.0.1:${V3_WEB_PORT:-4400}:4400"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:4400/login').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  postgres-data:
  hf-cache:
