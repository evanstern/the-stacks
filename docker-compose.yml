# the Stacks v3 walking skeleton — five services, one dependency chain:
#   postgres -> api -> {worker, web}, plus ml -> worker.
# All depends_on use condition: service_healthy, so `up --wait` only returns once
# the whole chain is genuinely serving. The API runs migrations before binding its
# port, which means its /ready healthcheck also gates the stack on schema success.
#
# Ports: everything binds 127.0.0.1 only and is env-overridable. The 44xx/5442
# block and distinct project name keep this stack from colliding with parallel
# worktrees (originally chosen to avoid the now-retired v2 stack — research R3, ADR 0001).
#
# GOTCHA: Docker Compose interpolates .env values, so a literal $ (bcrypt hashes
# like OPERATOR_PASSWORD_HASH) must be escaped as $$ in .env — see .env.example.
#
# Prod overlay: docker-compose.prod.yml unpublishes everything except web.

name: ${COMPOSE_PROJECT_NAME:-the-stacks-v3}

services:
  # pgvector-enabled Postgres 17 — the only stateful service (postgres-data volume).
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${V3_POSTGRES_DB:-stacks_v3}
      POSTGRES_USER: ${V3_POSTGRES_USER:-stacks_v3}
      POSTGRES_PASSWORD: ${V3_POSTGRES_PASSWORD:-stacks_v3}
    ports:
      - "127.0.0.1:${V3_POSTGRES_PORT:-5442}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${V3_POSTGRES_USER:-stacks_v3}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # TS API. Its start script runs migrations, THEN binds 4401 — so the /ready
  # healthcheck below doubles as "migrations applied" for everything downstream.
  api:
    build:
      context: . # workspace root: the Dockerfile needs packages/ + tsconfig.base.json
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://stacks_v3:stacks_v3@postgres:5432/stacks_v3}
      # bcrypt hashes contain $ — in .env each $ must be written $$ or compose
      # interpolation will mangle the hash (see .env.example).
      OPERATOR_PASSWORD_HASH: ${OPERATOR_PASSWORD_HASH}
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local-sidecar}
      EMBEDDING_ENDPOINT: ${EMBEDDING_ENDPOINT:-http://ml:4402}
      EMBEDDING_MODEL_ID: ${EMBEDDING_MODEL_ID:-sentence-transformers/all-MiniLM-L6-v2}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-384}
      # Ingestion intake cap (008): enforced inside the multipart stream, so an
      # oversized upload is refused without ever being buffered (research R7).
      INGEST_MAX_UPLOAD_BYTES: ${INGEST_MAX_UPLOAD_BYTES:-26214400}
      V3_API_PORT: ${V3_API_PORT:-4401}
    ports:
      # BOTH sides must track V3_API_PORT: main.ts binds to
      # process.env.V3_API_PORT (passed through above), so unlike web's fixed
      # internal PORT=4400, the container-side port here is NOT always 4401 —
      # a worktree overriding V3_API_PORT (the spec-cycle port-block
      # convention) must move both the host mapping and the container's own
      # listen port together, or the healthcheck below probes the wrong port.
      - "127.0.0.1:${V3_API_PORT:-4401}:${V3_API_PORT:-4401}"
    # node -e fetch(): no curl/wget in node:22-slim, so probe with node itself.
    # /ready (not /health) so "healthy" means migrated + serving.
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:${V3_API_PORT:-4401}/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  # Python embedding sidecar — the only Python in v3 (decision D2). Stateless,
  # inference-only, no DB. Contract: specs/007-v3-skeleton/contracts/ml-sidecar.md.
  ml:
    build:
      context: ./apps/ml # self-contained; does NOT need the pnpm workspace
    volumes:
      # HF_HOME points here (see apps/ml/Dockerfile): first start downloads the
      # model into this named volume, warm starts are a cache hit (SC-001).
      - hf-cache:/hf-cache
    environment:
      # Pins the served model (Principle VII) — never hardcoded in the app.
      # api/worker must be configured with the SAME id or /v1/embed returns 404.
      ML_EMBEDDING_MODEL: ${ML_EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      EMBED_MAX_BATCH: ${EMBED_MAX_BATCH:-64}
    ports:
      - "127.0.0.1:${V3_ML_PORT:-4402}:4402"
    # /ready flips 503->200 only after the background model load completes, so
    # the generous retries/start_period budget covers a cold first download.
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4402/ready').status==200 else 1)",
        ]
      interval: 5s
      timeout: 5s
      retries: 90
      start_period: 60s

  # Job runner: polls the DB queue, calls ml for embeddings. Waits on BOTH
  # api (proves migrations ran — worker shares the schema) and ml (its runtime
  # dependency for embed jobs).
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    depends_on:
      api:
        condition: service_healthy
      ml:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://stacks_v3:stacks_v3@postgres:5432/stacks_v3}
      WORKER_POLL_MS: ${WORKER_POLL_MS:-2000}
      WORKER_VISIBILITY_TIMEOUT_MS: ${WORKER_VISIBILITY_TIMEOUT_MS:-60000}
      JOB_MAX_ATTEMPTS: ${JOB_MAX_ATTEMPTS:-3}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local-sidecar}
      EMBEDDING_ENDPOINT: ${EMBEDDING_ENDPOINT:-http://ml:4402}
      EMBEDDING_MODEL_ID: ${EMBEDDING_MODEL_ID:-sentence-transformers/all-MiniLM-L6-v2}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-384}
      ML_REQUEST_TIMEOUT_MS: ${ML_REQUEST_TIMEOUT_MS:-15000}
      # Ingestion pipeline knobs (008): ZIP expansion caps + chunking policy.
      # Chunking is env-tunable BY DESIGN (eval program, research R4).
      INGEST_MAX_UPLOAD_BYTES: ${INGEST_MAX_UPLOAD_BYTES:-26214400}
      INGEST_MAX_BATCH_ENTRIES: ${INGEST_MAX_BATCH_ENTRIES:-200}
      CHUNK_TARGET_CHARS: ${CHUNK_TARGET_CHARS:-4000}
      CHUNK_OVERLAP_CHARS: ${CHUNK_OVERLAP_CHARS:-400}
      CHUNK_MAX_CHARS: ${CHUNK_MAX_CHARS:-6000}
      # The worker batches its /v1/embed calls to the same cap the sidecar enforces.
      EMBED_MAX_BATCH: ${EMBED_MAX_BATCH:-64}
    # Worker has no HTTP surface, so health = "heartbeat file touched within the
    # last minute". The poll loop refreshes /tmp/worker-heartbeat each tick; if
    # the loop wedges, the file goes stale and the check fails.
    healthcheck:
      test: ["CMD-SHELL", "find /tmp/worker-heartbeat -mmin -1 | grep -q ."]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  # RR7 web frontend — the only service the prod overlay leaves published.
  # Talks to the API over the compose network (API_INTERNAL_URL), never localhost.
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    environment:
      # api's own container-internal port tracks V3_API_PORT (see api's port
      # comment above) — this must match, or web's server-side calls 404.
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:${V3_API_PORT:-4401}}
      PORT: "4400"
    ports:
      - "127.0.0.1:${V3_WEB_PORT:-4400}:4400"
    # No dedicated health route; /login rendering (any status < 500) proves the
    # server is up and its route pipeline works.
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:4400/login').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

# Named volumes: the stack's only persistent state. postgres-data holds the DB;
# hf-cache holds downloaded model weights so ml restarts don't re-download.
volumes:
  postgres-data:
  hf-cache:
