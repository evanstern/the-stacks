name: ikis-docling

services:
  redis:
    image: redis:7-alpine
    container_name: ikis-docling-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6384}:6379"

  app:
    build:
      context: .
      dockerfile: Dockerfile.docling
      args:
        HF_TOKEN: ${HF_TOKEN:-}
        HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-${HF_TOKEN:-}}
    container_name: ikis-docling
    restart: unless-stopped
    depends_on:
      - redis
    ports:
      - "127.0.0.1:${APP_HOST_PORT:-5174}:3000"
    environment:
      NODE_ENV: production
      IKIS_SHARED_PASSWORD: ${IKIS_SHARED_PASSWORD:?IKIS_SHARED_PASSWORD is required (see docs/deployment.md)}
      IKIS_AUTH_SECRET: ${IKIS_AUTH_SECRET:?IKIS_AUTH_SECRET is required (see docs/deployment.md)}
      PUBLIC_URL: ${PUBLIC_URL:-http://127.0.0.1:5174}
      THE_STACKS_DB_PATH: /app/data/the-stacks-docling.sqlite
      IKIS_UPLOAD_DIR: /app/data/uploads
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-80}
      REDIS_URL: redis://redis:6379/0
      IKIS_OCR_QUEUE_NAME: ${IKIS_OCR_QUEUE_NAME:-ikis:docling:ocr:jobs}
      IKIS_OCR_ENGINE: ${IKIS_OCR_ENGINE:-ocrmypdf}
      IKIS_OCRMYPDF_MODE: ${IKIS_OCRMYPDF_MODE:-force-ocr}
      IKIS_OCR_LANGUAGE: ${IKIS_OCR_LANGUAGE:-eng}
      IKIS_OCR_COMMAND_TIMEOUT_MS: ${IKIS_OCR_COMMAND_TIMEOUT_MS:-300000}
      IKIS_REVIEW_LLM_PROVIDER_KEY: ${IKIS_REVIEW_LLM_PROVIDER_KEY:-}
      IKIS_GROUNDED_ANSWER_PROVIDER: ${IKIS_GROUNDED_ANSWER_PROVIDER:-}
      IKIS_GROUNDED_ANSWER_PROVIDER_KEY: ${IKIS_GROUNDED_ANSWER_PROVIDER_KEY:-}
      IKIS_GROUNDED_ANSWER_PROVIDER_URL: ${IKIS_GROUNDED_ANSWER_PROVIDER_URL:-}
      IKIS_GROUNDED_ANSWER_MODEL: ${IKIS_GROUNDED_ANSWER_MODEL:-}
      IKIS_GROUNDED_ANSWER_TIMEOUT_MS: ${IKIS_GROUNDED_ANSWER_TIMEOUT_MS:-15000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-${HF_TOKEN:-}}
      DOCLING_ARTIFACTS_PATH: ${DOCLING_ARTIFACTS_PATH:-/opt/docling-models}
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-1}
    volumes:
      - ./data-docling:/app/data

  ocr-worker:
    build:
      context: .
      dockerfile: Dockerfile.docling
      args:
        HF_TOKEN: ${HF_TOKEN:-}
        HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-${HF_TOKEN:-}}
    container_name: ikis-docling-ocr-worker
    restart: unless-stopped
    depends_on:
      - redis
      - app
    command: ["pnpm", "ocr:worker"]
    environment:
      NODE_ENV: production
      IKIS_SHARED_PASSWORD: ${IKIS_SHARED_PASSWORD:?IKIS_SHARED_PASSWORD is required (see docs/deployment.md)}
      IKIS_AUTH_SECRET: ${IKIS_AUTH_SECRET:?IKIS_AUTH_SECRET is required (see docs/deployment.md)}
      THE_STACKS_DB_PATH: /app/data/the-stacks-docling.sqlite
      IKIS_UPLOAD_DIR: /app/data/uploads
      REDIS_URL: redis://redis:6379/0
      IKIS_OCR_QUEUE_NAME: ${IKIS_OCR_QUEUE_NAME:-ikis:docling:ocr:jobs}
      IKIS_OCR_WORKER_MAX_ATTEMPTS: ${IKIS_OCR_WORKER_MAX_ATTEMPTS:-3}
      IKIS_OCR_ENGINE: ${IKIS_OCR_ENGINE:-ocrmypdf}
      IKIS_OCRMYPDF_MODE: ${IKIS_OCRMYPDF_MODE:-force-ocr}
      IKIS_OCR_LANGUAGE: ${IKIS_OCR_LANGUAGE:-eng}
      IKIS_OCR_COMMAND_TIMEOUT_MS: ${IKIS_OCR_COMMAND_TIMEOUT_MS:-300000}
      IKIS_REVIEW_LLM_PROVIDER_KEY: ${IKIS_REVIEW_LLM_PROVIDER_KEY:-}
      IKIS_GROUNDED_ANSWER_PROVIDER: ${IKIS_GROUNDED_ANSWER_PROVIDER:-}
      IKIS_GROUNDED_ANSWER_PROVIDER_KEY: ${IKIS_GROUNDED_ANSWER_PROVIDER_KEY:-}
      IKIS_GROUNDED_ANSWER_PROVIDER_URL: ${IKIS_GROUNDED_ANSWER_PROVIDER_URL:-}
      IKIS_GROUNDED_ANSWER_MODEL: ${IKIS_GROUNDED_ANSWER_MODEL:-}
      IKIS_GROUNDED_ANSWER_TIMEOUT_MS: ${IKIS_GROUNDED_ANSWER_TIMEOUT_MS:-15000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-${HF_TOKEN:-}}
      DOCLING_ARTIFACTS_PATH: ${DOCLING_ARTIFACTS_PATH:-/opt/docling-models}
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-1}
    volumes:
      - ./data-docling:/app/data
